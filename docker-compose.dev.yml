# Локальная Postgres (+ опционально pgAdmin). Не публикует приложение.
services:
  postgres:
    image: postgres:16-alpine
    container_name: noir-ride-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: noir_ride
      POSTGRES_USER: noir_admin
      POSTGRES_PASSWORD: noir_password_2026
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U noir_admin -d noir_ride']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: noir-ride-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@noirride.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_LISTEN_PORT: 80
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  default:
    name: noir-ride-network
